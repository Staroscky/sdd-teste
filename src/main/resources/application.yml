spring:
  application:
    name: extrato-bff
  threads:
    virtual:
      enabled: true

server:
  port: 8080

feign:
  okhttp:
    enabled: true
  client:
    config:
      default:
        loggerLevel: FULL

upstream:
  recentes:
    url: ${UPSTREAM_RECENTES_URL:http://localhost:9001}
    timeout:
      connect: ${UPSTREAM_RECENTES_CONNECT_TIMEOUT:3000}
      read: ${UPSTREAM_RECENTES_READ_TIMEOUT:5000}
  futuros:
    url: ${UPSTREAM_FUTUROS_URL:http://localhost:9002}
    timeout:
      connect: ${UPSTREAM_FUTUROS_CONNECT_TIMEOUT:3000}
      read: ${UPSTREAM_FUTUROS_READ_TIMEOUT:5000}

resilience4j:
  circuitbreaker:
    instances:
      recentes:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
      futuros:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,circuitbreakers
  health:
    circuitbreakers:
      enabled: true

logbook:
  obfuscate:
    headers:
      - Authorization
      - X-Api-Key
  format:
    style: json
